services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsocr}
      POSTGRES_USER: ${POSTGRES_USER:-dsocr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsocr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      APP_ENV: local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dsocr}
      POSTGRES_USER: ${POSTGRES_USER:-dsocr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsocr}
      STORAGE_ROOT: /app/storage
      OCR_BACKEND: stub
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
    profiles:
      - api

volumes:
  postgres_data:
